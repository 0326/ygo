# 自动同步卡牌数据到远端 D1（scripts/sync-data.mjs）
# 需要仓库 Secrets：CLOUDFLARE_API_TOKEN（D1 Edit 权限）、CLOUDFLARE_ACCOUNT_ID
name: Sync card data

on:
  schedule:
    # UTC 周一/周四 21:00 = 北京时间周二/周五 05:00
    - cron: "0 21 * * 1,4"
  workflow_dispatch: {}

concurrency:
  group: sync-card-data
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # CI 无 .sync-state.json，每次都会全量重建并写入远端 D1
      - name: Sync & apply to remote D1
        run: node scripts/sync-data.mjs --apply remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
